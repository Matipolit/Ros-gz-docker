%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters
#--------------------------------------------------------------------------------------------
File.version: "1.0"

Camera.type: "PinHole"

# Ogniskowe i środek obrazu
Camera1.fx: 480.0
Camera1.fy: 480.0
Camera1.cx: 320.0
Camera1.cy: 240.0

# Dystorsja (idealna symulacja = 0)
Camera1.k1: 0.0
Camera1.k2: 0.0
Camera1.p1: 0.0
Camera1.p2: 0.0

# Rozdzielczość
Camera.width: 640
Camera.height: 480

# Klatki na sekundę
Camera.fps: 30

# Kolor: 1 dla RGB, 0 dla BGR
Camera.RGB: 1

#--------------------------------------------------------------------------------------------
# Ustawienia RGB-D
#--------------------------------------------------------------------------------------------
Stereo.ThDepth: 40.0
Stereo.b: 0.05

# UWAGA: Jeżeli chmura w ORB-SLAM3 będzie płaska lub mikroskopijna,
# zmień RGBD.DepthMapFactor na 1000.0 (częsty przypadek konwersji metry/milimetry w ROS 2)
RGBD.DepthMapFactor: 1.0

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------
ORBextractor.nFeatures: 1000
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------

Viewer.Enabled: 0
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -3.5
Viewer.ViewpointF: 500.0
